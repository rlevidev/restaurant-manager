services:
  postgres:
    image: postgres:16-alpine
    container_name: restaurantmanager-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: restaurantmanager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d restaurantmanager"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
    name: restaurantmanager-postgres-data
